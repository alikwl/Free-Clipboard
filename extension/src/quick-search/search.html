<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeClipboard Quick Paste</title>
  <link rel="stylesheet" href="search.css">
</head>
<body>
  <div class="panel-shell">
    <header class="panel-header">
      <div>
        <p class="eyebrow">Quick Paste</p>
        <h1>FreeClipboard</h1>
        <p class="subtitle">Search, copy, paste, pin, and send saved clips to ClipMind.</p>
      </div>
      <button id="close-btn" class="icon-btn" type="button" aria-label="Close quick paste panel">×</button>
    </header>

    <div class="search-row">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        id="search-input"
        placeholder="Search clips, snippets, notes, and secrets"
        autocomplete="off"
        autofocus
      >
    </div>

    <div id="status-banner" class="status-banner hidden"></div>
    <div id="sensitive-banner" class="sensitive-banner hidden"></div>

    <div id="results" class="results"></div>

    <footer class="panel-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> Move</span>
      <span><kbd>Enter</kbd> Copy</span>
      <span><kbd>Ctrl/Cmd</kbd><kbd>1-9</kbd> Quick copy</span>
      <span><kbd>Esc</kbd> Close</span>
    </footer>
  </div>

  <script src="search.js" type="module"></script>
</body>
</html>

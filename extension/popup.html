<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 360px;
  min-height: 480px;
  background: #0f0f0f;
  color: #fff;
  font-family: -apple-system, sans-serif;
  font-size: 13px;
}

#view-loading, #view-login, #view-dashboard {
  display: none;
  flex-direction: column;
  padding: 24px;
  min-height: 480px;
}

/* Loading */
#view-loading {
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #888;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid #333;
  border-top-color: #7C3AED;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Login */
#view-login { align-items: center; justify-content: center; gap: 16px; }
.logo { font-size: 22px; font-weight: 700; color: #7C3AED; }
.feature-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.feature-item {
  padding: 12px 14px;
  background: #1a1a1a;
  border-radius: 8px;
  color: #ccc;
  font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.feature-item::before { content: '\2022'; color: #7C3AED; font-size: 18px; }
.btn-primary {
  width: 100%; padding: 14px;
  background: #7C3AED; color: white;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.btn-primary:hover { background: #6D28D9; }
.btn-secondary {
  background: transparent; color: #666;
  border: 1px solid #333; border-radius: 8px;
  padding: 10px; width: 100%;
  cursor: pointer; font-size: 12px;
}
.btn-secondary:hover { color: #999; border-color: #555; }
#login-status { font-size: 11px; color: #f87171; text-align: center; }

/* Dashboard */
#view-dashboard { padding: 16px; gap: 12px; }
.dash-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding-bottom: 12px;
  border-bottom: 1px solid #1f1f1f;
}
.user-info { display: flex; flex-direction: column; gap: 2px; }
#user-email { font-size: 11px; color: #888; }
#plan-badge {
  font-size: 10px; padding: 2px 6px;
  background: #7C3AED22; color: #a78bfa;
  border-radius: 4px; display: inline-block;
  margin-top: 2px;
}
.dash-actions { display: flex; gap: 6px; }
.icon-btn {
  background: #1a1a1a; border: none;
  color: #888; padding: 6px 8px;
  border-radius: 6px; cursor: pointer;
  font-size: 12px;
}
.icon-btn:hover { color: #fff; background: #222; }

.quick-add { display: flex; gap: 6px; }
.quick-add textarea {
  flex: 1; background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 8px; color: #fff;
  padding: 8px 10px; font-size: 12px;
  resize: none; height: 60px;
  font-family: inherit;
}
.quick-add textarea:focus { outline: none; border-color: #7C3AED; }
#save-btn {
  background: #7C3AED; color: white;
  border: none; border-radius: 8px;
  padding: 0 14px; cursor: pointer;
  font-size: 12px; font-weight: 600;
  min-width: 50px;
}
#save-btn:disabled { opacity: 0.6; }

.section-label {
  font-size: 10px; color: #555;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

#clips-list {
  display: flex; flex-direction: column;
  gap: 4px; flex: 1;
  max-height: 240px; overflow-y: auto;
}
#clips-list::-webkit-scrollbar { width: 4px; }
#clips-list::-webkit-scrollbar-track { background: transparent; }
#clips-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.clip-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: #1a1a1a; border-radius: 6px;
  cursor: pointer; gap: 8px;
}
.clip-row:hover { background: #222; }
.clip-text {
  flex: 1; font-size: 12px; color: #ccc;
  overflow: hidden; white-space: nowrap;
  text-overflow: ellipsis;
}
.copy-indicator {
  font-size: 11px; color: #555;
  min-width: 28px; text-align: right;
}
.clip-row:hover .copy-indicator { color: #7C3AED; }

.loading-text, .empty-state {
  text-align: center; color: #555;
  padding: 20px; font-size: 12px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div id="view-loading" style="display:flex">
  <div class="spinner"></div>
  <span>Connecting...</span>
</div>

<div id="view-login">
  <div class="logo">\u{1F4CB} FreeClipboard</div>
  <div class="feature-list">
    <div class="feature-item">Save text from any webpage instantly</div>
    <div class="feature-item">Quick-paste your last saved clips</div>
    <div class="feature-item">Auto-expand ;;snippets anywhere</div>
  </div>
  <button class="btn-primary" id="login-btn">Sign in to FreeClipboard</button>
  <button class="btn-secondary" id="refresh-btn">I already logged in &mdash; refresh</button>
  <div id="login-status"></div>
</div>

<div id="view-dashboard">
  <div class="dash-header">
    <div class="user-info">
      <span id="user-email">user@email.com</span>
      <span id="plan-badge">Free</span>
    </div>
    <div class="dash-actions">
      <button class="icon-btn" id="refresh-btn-dash" title="Refresh">&olarr;</button>
      <button class="icon-btn" id="open-site" title="Open Dashboard">&osol;</button>
      <button class="icon-btn" id="logout-btn" title="Logout">&otimes;</button>
    </div>
  </div>

  <span class="section-label">Quick Save</span>
  <div class="quick-add">
    <textarea id="quick-input" placeholder="Paste text to save..."></textarea>
    <button id="save-btn">Save</button>
  </div>

  <span class="section-label">Recent Clips</span>
  <div id="clips-list">
    <div class="loading-text">Loading...</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>

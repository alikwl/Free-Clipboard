<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeClipboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px; min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e2e2e8;
      overflow-x: hidden;
    }

    /* ── Login View ── */
    #view-login {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 500px; padding: 24px; gap: 20px;
    }
    #view-login .logo {
      font-size: 22px; font-weight: 900; letter-spacing: 1px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #view-login .features {
      display: flex; flex-direction: column; gap: 10px; width: 100%;
    }
    #view-login .feature {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      font-size: 12px; color: #a0a0b0;
    }
    #view-login .feature-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .btn {
      border: none; border-radius: 10px; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; width: 100%; padding: 12px 24px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: #71717a;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 20px; font-size: 11px; margin-top: 8px;
    }
    .btn-ghost:hover { color: #a5b4fc; }

    /* ── Dashboard View ── */
    #view-dashboard { display: none; flex-direction: column; height: 500px; }
    .dash-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-email {
      font-size: 12px; font-weight: 600; color: #e2e2e8;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .plan-badge {
      display: inline-block; font-size: 9px; font-weight: 800;
      padding: 2px 8px; border-radius: 100px; margin-top: 2px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .plan-free { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }
    .plan-pro { background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05)); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }

    .clips-loading { text-align: center; padding: 20px; color: #52525b; font-size: 12px; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #818cf8; border-radius: 50%; animation: spin .6s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #clips-list { flex: 1; overflow-y: auto; padding: 8px 16px; display: flex; flex-direction: column; gap: 4px; }
    #clips-list::-webkit-scrollbar { width: 4px; }
    #clips-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .clip-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.02); border: 1px solid transparent;
      transition: all .15s;
    }
    .clip-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
    .clip-preview {
      flex: 1; font-size: 11px; color: #a0a0b0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .copy-btn {
      padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #71717a; cursor: pointer;
      font-size: 10px; font-weight: 600; transition: all .15s;
    }
    .copy-btn:hover { background: rgba(99,102,241,0.15); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }

    .quick-add {
      padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.01); display: flex; gap: 8px;
    }
    .quick-add input {
      flex: 1; padding: 8px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: #e2e2e8; font-size: 11px; outline: none;
    }
    .quick-add input:focus { border-color: rgba(99,102,241,0.4); }
    .quick-add input::placeholder { color: #52525b; }
    .btn-save {
      padding: 6px 16px; border-radius: 7px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.3; cursor: default; }

    .bottom-nav {
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .bottom-nav a {
      display: flex; align-items: center; gap: 4px;
      color: #71717a; text-decoration: none; font-size: 10px; font-weight: 600;
      padding: 6px 10px; border-radius: 6px; transition: all .15s; cursor: pointer;
    }
    .bottom-nav a:hover { color: #a5b4fc; background: rgba(99,102,241,0.06); }
  </style>
</head>
<body>

  <!-- ── Login View ── -->
  <div id="view-login">
    <div class="logo">FreeClipboard</div>
    <div class="features">
      <div class="feature">
        <div class="feature-dot" style="background:#818cf8"></div>
        <span>Save text from any webpage instantly</span>
      </div>
      <div class="feature">
        <div class="feature-dot" style="background:#a78bfa"></div>
        <span>Quick-paste your last 5 saved clips</span>
      </div>
      <div class="feature">
        <div class="feature-dot" style="background:#c084fc"></div>
        <span>Auto-expand ;;snippets in any text field</span>
      </div>
    </div>
    <button class="btn btn-primary" id="login-btn">Sign in to FreeClipboard</button>
    <button class="btn btn-ghost" id="refresh-btn">I already logged in — refresh</button>
    <button class="btn btn-ghost" id="logout-btn" style="display:none">Logout</button>
  </div>

  <!-- ── Dashboard View ── -->
  <div id="view-dashboard">
    <div class="dash-header">
      <div class="avatar" id="avatar-initial">FC</div>
      <div class="user-info">
        <div class="user-email" id="user-email">loading...</div>
        <span class="plan-badge plan-free" id="plan-badge">Free</span>
      </div>
    </div>
    <div class="clips-loading" id="clips-loading">
      <div class="spinner"></div>
      Loading clips...
    </div>
    <div id="clips-list"></div>
    <div class="quick-add">
      <input type="text" id="quick-input" placeholder="Quick-add a clip..." />
      <button class="btn-save" id="save-btn">Save</button>
    </div>
    <div class="bottom-nav">
      <a id="open-dashboard">\u{1F4CA} Dashboard</a>
      <a id="refresh-clips">\u{1F504} Refresh</a>
      <a id="logout-link">\u{1F6AA} Logout</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeClipboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px; height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e2e2e8;
      overflow: hidden; user-select: none;
    }
    #app { height: 100%; display: flex; flex-direction: column; }

    /* Logged-out state */
    .logged-out {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 24px; gap: 20px;
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: 1px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .features { display: flex; flex-direction: column; gap: 10px; }
    .feature {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      font-size: 12px; color: #a0a0b0; width: 100%;
    }
    .feature-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .btn {
      padding: 10px 24px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; width: 100%;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Logged-in state */
    .logged-in { display: flex; flex-direction: column; height: 100%; }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-email {
      font-size: 12px; font-weight: 600; color: #e2e2e8;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .plan-badge {
      display: inline-block; font-size: 9px; font-weight: 800;
      padding: 2px 8px; border-radius: 100px; margin-top: 2px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .plan-free { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }
    .plan-pro {
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      color: #fbbf24; border: 1px solid rgba(245,158,11,0.2);
    }

    .search-bar { padding: 10px 16px; }
    .search-input {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: #e2e2e8; font-size: 12px; outline: none;
    }
    .search-input:focus { border-color: rgba(99,102,241,0.4); }
    .search-input::placeholder { color: #52525b; }

    .clip-list {
      flex: 1; overflow-y: auto; padding: 0 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .clip-list::-webkit-scrollbar { width: 4px; }
    .clip-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .clip-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      background: rgba(255,255,255,0.02); border: 1px solid transparent;
      transition: all 0.15s;
    }
    .clip-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
    .clip-icon { font-size: 14px; flex-shrink: 0; opacity: 0.5; }
    .clip-text {
      flex: 1; font-size: 11px; color: #a0a0b0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      line-height: 1.4;
    }
    .clip-copy-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: rgba(255,255,255,0.05); color: #71717a; cursor: pointer;
      font-size: 13px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .clip-copy-btn:hover { background: rgba(99,102,241,0.15); color: #a5b4fc; }

    .empty-state {
      text-align: center; padding: 40px 20px; color: #52525b; font-size: 12px;
    }

    .quick-add {
      padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.01);
    }
    .quick-add textarea {
      width: 100%; height: 48px; padding: 8px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: #e2e2e8; font-size: 11px; resize: none; outline: none;
    }
    .quick-add textarea:focus { border-color: rgba(99,102,241,0.4); }
    .quick-add textarea::placeholder { color: #52525b; }
    .quick-add-actions {
      display: flex; align-items: center; justify-content: space-between; margin-top: 6px;
    }
    .btn-save {
      padding: 6px 16px; border-radius: 7px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.3; cursor: default; }

    .bottom-nav {
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .bottom-nav a {
      display: flex; align-items: center; gap: 4px;
      color: #71717a; text-decoration: none; font-size: 10px; font-weight: 600;
      padding: 6px 10px; border-radius: 6px; transition: all 0.15s;
    }
    .bottom-nav a:hover { color: #a5b4fc; background: rgba(99,102,241,0.06); }
    .bottom-nav .nav-icon { font-size: 13px; }

    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; border-radius: 8px; font-size: 11px; font-weight: 600;
      background: #0f172a; border: 1px solid #22c55e; color: #86efac;
      z-index: 100; white-space: nowrap; pointer-events: none;
      animation: toast-in 0.3s ease;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

    .loader {
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #818cf8; border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <div class="loader"><div class="spinner"></div></div>
</div>
<script src="popup.js"></script>
</body>
</html>
